events {}

http {
    # Re-resolve service hostnames when backends are recreated (Docker embedded DNS).
    # Without this, nginx can keep a stale IP after `docker compose build` / container replace → 502.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 8000;
        server_name _;

        client_max_body_size 20m;

        # Auth Service
        location /api/v1/auth/ {
            set $luna_auth_upstream auth-service:8001;
            proxy_pass http://$luna_auth_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Book Service
        location /api/v1/books/ {
            set $luna_book_upstream book-service:8002;
            proxy_pass http://$luna_book_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Delivery Service
        location /api/v1/requests/ {
            set $luna_delivery_upstream delivery-service:8003;
            proxy_pass http://$luna_delivery_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }
        location /api/v1/returns/ {
            set $luna_delivery_upstream delivery-service:8003;
            proxy_pass http://$luna_delivery_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }
        location /api/v1/deliveries/ {
            set $luna_delivery_upstream delivery-service:8003;
            proxy_pass http://$luna_delivery_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Robot Service
        location /api/v1/robot/ {
            set $luna_robot_upstream robot-service:8004;
            proxy_pass http://$luna_robot_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Notification Service (+ websocket support)
        location /api/v1/notifications/ {
            set $luna_notify_upstream notification-service:8005;
            proxy_pass http://$luna_notify_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /ws/ {
            set $luna_notify_upstream notification-service:8005;
            proxy_pass http://$luna_notify_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /health {
            return 200 '{"status":"healthy","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
